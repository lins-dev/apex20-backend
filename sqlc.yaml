version: "2"
sql:
  - schema: "internal/infrastructure/adapter/outbound/repository/migrations"
    queries: "internal/infrastructure/adapter/outbound/repository/queries"
    engine: "postgresql"
    gen:
      go:
        package: "repositorygen"
        out: "internal/infrastructure/adapter/outbound/repository/gen"
        emit_interface: true
        emit_json_tags: true
        emit_prepared_queries: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.role"
            go_type:
              import: "github.com/apex20/contracts/proto/apex20/v1"
              package: "apex20v1"
              type: "Role"
          - column: "role_permissions.role"
            go_type:
              import: "github.com/apex20/contracts/proto/apex20/v1"
              package: "apex20v1"
              type: "Role"
